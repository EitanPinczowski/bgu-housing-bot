# Pre-commit hooks. Install once:  pip install pre-commit && pre-commit install
# Then every `git commit` runs these; run on the whole repo with `pre-commit run -a`.
repos:
  # Lint (uses ruff.toml). Catches undefined names / unused imports — the class of
  # bug that let the OVERPASS_URL -> OVERPASS_URLS rename slip through.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]

  # Secret scan — a hard guard so .env, auth/, or a pasted token can never be
  # committed (the account is the user's only Facebook account; see CLAUDE.md).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Small safety nets.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
